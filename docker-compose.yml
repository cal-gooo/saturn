version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: a2a-commerce-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: a2a_commerce
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d a2a_commerce"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

